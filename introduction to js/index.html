<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Introduction to JavaScript</title>
</head>
<body>

    <!-- Ye simple heading hai jo HTML ka part hai -->
    <h1 id="mainHeading">Welcome to JavaScript</h1>

    <!-- Ye paragraph hai -->
    <p id="para">JavaScript abhi start hone wala hai...</p>

    <!-- Ye button hai jisko click karne par JS chalega -->
    <button onclick="changeContent()">Click Me</button>

    <!-- External JavaScript file connect kar rahe hain -->
    <script src="script.js"></script>

</body>
</html>
